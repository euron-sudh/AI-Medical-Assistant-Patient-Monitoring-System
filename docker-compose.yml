version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medassist
      POSTGRES_USER: medassist
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medassist_dev}
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medassist"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  influxdb:
    image: influxdb:2.7
    ports:
      - "8099:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: medassist
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-medassist_dev}
      DOCKER_INFLUXDB_INIT_ORG: medassist
      DOCKER_INFLUXDB_INIT_BUCKET: vitals
    volumes:
      - influxdb_data:/var/lib/influxdb2

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9299:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9099:9000"
      - "9098:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "5055:5000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://medassist:${DB_PASSWORD:-medassist_dev}@postgres:5432/medassist
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      INFLUXDB_URL: http://influxdb:8086
      ELASTICSEARCH_URL: http://elasticsearch:9200
      S3_ENDPOINT_URL: http://minio:9000
      CORS_ORIGINS: http://localhost:3055
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0 --port=5000 --debug

  celery-worker:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://medassist:${DB_PASSWORD:-medassist_dev}@postgres:5432/medassist
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A celery_worker.celery worker --loglevel=info

  celery-beat:
    build: ./backend
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A celery_worker.celery beat --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3055:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5055/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:5055
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  elasticsearch_data:
  minio_data:

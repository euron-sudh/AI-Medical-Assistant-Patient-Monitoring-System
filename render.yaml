# Render Blueprint — deploy MedAssist AI with one click
# Docs: https://docs.render.com/blueprint-spec

databases:
  - name: medassist-db
    plan: free
    databaseName: medassist
    user: medassist

services:
  # Flask Backend API
  - type: web
    name: medassist-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: medassist-db
          property: connectionString
      - key: EURI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: EURI_BASE_URL
        value: https://api.euron.one/api/v1/euri
      - key: OPENAI_API_KEY
        sync: false  # Same as EURI_API_KEY
      - key: OPENAI_MODEL_PRIMARY
        value: gpt-4o-mini
      - key: OPENAI_MODEL_FAST
        value: gpt-4o-mini

  # Next.js Frontend
  - type: web
    name: medassist-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: medassist-backend
          type: web
          property: hostport
        # Will be set to https://medassist-backend.onrender.com
      - key: NODE_ENV
        value: production

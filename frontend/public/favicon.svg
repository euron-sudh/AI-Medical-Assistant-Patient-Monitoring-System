<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Medical cross with AI circuit motif -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="#2563eb" />
  <!-- Cross -->
  <rect x="20" y="10" width="8" height="28" rx="2" fill="white" />
  <rect x="10" y="20" width="28" height="8" rx="2" fill="white" />
  <!-- Circuit dots (AI motif) -->
  <circle cx="12" cy="12" r="2.5" fill="#93c5fd" />
  <circle cx="36" cy="12" r="2.5" fill="#93c5fd" />
  <circle cx="12" cy="36" r="2.5" fill="#93c5fd" />
  <circle cx="36" cy="36" r="2.5" fill="#93c5fd" />
  <!-- Circuit lines -->
  <line x1="14" y1="12" x2="20" y2="12" stroke="#93c5fd" stroke-width="1.5" />
  <line x1="28" y1="12" x2="34" y2="12" stroke="#93c5fd" stroke-width="1.5" />
  <line x1="12" y1="14" x2="12" y2="20" stroke="#93c5fd" stroke-width="1.5" />
  <line x1="36" y1="14" x2="36" y2="20" stroke="#93c5fd" stroke-width="1.5" />
  <line x1="12" y1="28" x2="12" y2="34" stroke="#93c5fd" stroke-width="1.5" />
  <line x1="36" y1="28" x2="36" y2="34" stroke="#93c5fd" stroke-width="1.5" />
  <line x1="14" y1="36" x2="20" y2="36" stroke="#93c5fd" stroke-width="1.5" />
  <line x1="28" y1="36" x2="34" y2="36" stroke="#93c5fd" stroke-width="1.5" />
</svg>

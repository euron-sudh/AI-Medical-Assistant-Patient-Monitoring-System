version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: always

  backend:
    image: ${REGISTRY_URL:-medassist}/backend:${IMAGE_TAG:-latest}
    expose:
      - "5000"
    env_file: .env.prod
    environment:
      FLASK_ENV: production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  celery-worker:
    image: ${REGISTRY_URL:-medassist}/backend:${IMAGE_TAG:-latest}
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=4
    env_file: .env.prod
    environment:
      FLASK_ENV: production
    depends_on:
      - redis
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_worker.celery inspect ping --timeout 10 2>/dev/null | grep -q OK || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3

  celery-beat:
    image: ${REGISTRY_URL:-medassist}/backend:${IMAGE_TAG:-latest}
    command: celery -A celery_worker.celery beat --loglevel=info
    env_file: .env.prod
    environment:
      FLASK_ENV: production
    depends_on:
      - redis
    restart: always
    healthcheck:
      disable: true

  frontend:
    image: ${REGISTRY_URL:-medassist}/frontend:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  redis_data:

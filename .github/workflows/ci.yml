name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medassist_test
          POSTGRES_USER: medassist
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medassist"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: backend
        run: ruff check . || true

      - name: Check formatting with black
        working-directory: backend
        run: black --check . || true

      - name: Run tests with pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://medassist:test_password@localhost:5432/medassist_test
          REDIS_URL: redis://localhost:6379/0
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key
        run: |
          if find tests -name "test_*.py" 2>/dev/null | head -1 | grep -q .; then
            pytest --cov=app --cov-report=xml -v
          else
            echo "No tests found yet — skipping pytest"
          fi

      - name: Upload coverage
        if: github.event_name == 'pull_request' && hashFiles('backend/coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Type check
        working-directory: frontend
        run: npm run type-check || true

      - name: Run tests
        working-directory: frontend
        run: |
          if find src -name "*.test.*" 2>/dev/null | head -1 | grep -q .; then
            npm test -- --coverage --watchAll=false
          else
            echo "No tests found yet — skipping jest"
          fi

      - name: Upload coverage
        if: github.event_name == 'pull_request' && hashFiles('frontend/coverage/') != ''
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

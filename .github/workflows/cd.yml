name: CD — Deploy to GCP

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: medassist-ai-prod
  GCP_REGION: us-central1
  GCP_ZONE: us-central1-c
  VM_NAME: medassist-vm
  ARTIFACT_REPO: medassist
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy to GCP
    runs-on: ubuntu-latest
    # Only deploy on direct pushes (merges), not PR builds
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Authenticate with GCP using Workload Identity Federation or SA key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Build and push backend image
      - name: Build backend image
        run: |
          docker build \
            -t ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/backend:${IMAGE_TAG} \
            -t ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/backend:latest \
            -f backend/Dockerfile.prod \
            backend/

      - name: Push backend image
        run: |
          docker push ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/backend:${IMAGE_TAG}
          docker push ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/backend:latest

      # Build and push frontend image
      - name: Build frontend image
        run: |
          docker build \
            -t ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/frontend:${IMAGE_TAG} \
            -t ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/frontend:latest \
            -f frontend/Dockerfile.prod \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }} \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            frontend/

      - name: Push frontend image
        run: |
          docker push ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/frontend:${IMAGE_TAG}
          docker push ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/frontend:latest

      # Deploy to VM via SSH
      - name: Deploy to VM
        run: |
          # Copy compose and nginx config to VM via a temp dir (avoids permission issues)
          gcloud compute ssh ${VM_NAME} --zone=${GCP_ZONE} --project=${GCP_PROJECT_ID} --command="
            mkdir -p /tmp/medassist-deploy/nginx
          "

          gcloud compute scp docker-compose.prod.yml ${VM_NAME}:/tmp/medassist-deploy/docker-compose.prod.yml \
            --zone=${GCP_ZONE} --project=${GCP_PROJECT_ID}

          # Copy .env.prod only if it exists in the checkout (it's gitignored, so it may not be present)
          if [ -f .env.prod ]; then
            gcloud compute scp .env.prod ${VM_NAME}:/tmp/medassist-deploy/.env.prod \
              --zone=${GCP_ZONE} --project=${GCP_PROJECT_ID}
          fi

          gcloud compute scp --recurse nginx ${VM_NAME}:/tmp/medassist-deploy/ \
            --zone=${GCP_ZONE} --project=${GCP_PROJECT_ID}

          # Move files into place and restart with sudo
          gcloud compute ssh ${VM_NAME} --zone=${GCP_ZONE} --project=${GCP_PROJECT_ID} --command="
            sudo cp /tmp/medassist-deploy/docker-compose.prod.yml /opt/medassist/docker-compose.prod.yml
            [ -f /tmp/medassist-deploy/.env.prod ] && sudo cp /tmp/medassist-deploy/.env.prod /opt/medassist/.env.prod
            sudo cp -r /tmp/medassist-deploy/nginx/* /opt/medassist/nginx/
            rm -rf /tmp/medassist-deploy
            cd /opt/medassist

            # Auth with registry
            sudo gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet 2>/dev/null || true

            # Set env vars for compose
            export REGISTRY_URL='${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}'
            export IMAGE_TAG='${IMAGE_TAG}'

            # Pull and restart
            sudo -E docker compose -f docker-compose.prod.yml pull
            sudo -E docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for services to stabilize then restart nginx to pick up new container IPs
            sleep 15
            sudo docker compose -f docker-compose.prod.yml restart nginx
            sleep 5

            # Cleanup
            sudo docker image prune -f

            echo 'Deployment complete!'
            sudo docker compose -f docker-compose.prod.yml ps

            # Show recent logs for debugging
            echo '--- Backend logs (last 30 lines) ---'
            sudo docker compose -f docker-compose.prod.yml logs --tail=30 backend 2>&1 || true
            echo '--- Frontend logs (last 15 lines) ---'
            sudo docker compose -f docker-compose.prod.yml logs --tail=15 frontend 2>&1 || true
          "

      # Health check
      - name: Verify deployment
        run: |
          VM_IP=$(gcloud compute instances describe ${VM_NAME} \
            --zone=${GCP_ZONE} --project=${GCP_PROJECT_ID} \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')

          echo "VM IP: ${VM_IP}"
          sleep 20

          for i in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${VM_IP}/health" --max-time 10 2>/dev/null || echo "000")
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "Health check PASSED (attempt ${i})"
              echo "App live at: http://${VM_IP}"
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${HTTP_CODE} — waiting..."
            sleep 10
          done

          echo "WARNING: Health check did not pass after 5 attempts. Check logs with: make logs-prod"
          exit 1
